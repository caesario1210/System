<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Log - EstateOS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Estate<span>OS</span></h2>
        <p>Real Estate Management</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="properties.html" class="nav-item">
          <span class="icon">🏢</span>
          <span>Properties</span>
        </a>
        <a href="customers.html" class="nav-item">
          <span class="icon">👥</span>
          <span>Customers</span>
        </a>
        <a href="transactions.html" class="nav-item">
          <span class="icon">💳</span>
          <span>Transactions</span>
        </a>
        <a href="reports.html" class="nav-item">
          <span class="icon">📈</span>
          <span>Reports</span>
        </a>
        <a href="users.html" class="nav-item">
          <span class="icon">👤</span>
          <span>Users</span>
        </a>
        <a href="activity.html" class="nav-item active">
          <span class="icon">📋</span>
          <span>Activity Log</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div>
            <div class="user-name" id="userName">Admin</div>
            <div class="user-role" id="userRole">admin</div>
          </div>
        </div>
        <button class="btn btn-logout btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Activity Log</h1>
          <p>Track all system activities</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="searchInput" class="search-input" placeholder="Search by username, action, or description...">
        </div>
        <div class="toolbar-right" id="pagination"></div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>User</th>
                  <th>Action</th>
                  <th>Description</th>
                  <th>Date &amp; Time</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display:none;">
              <div class="icon">📋</div>
              <h3>No activity found</h3>
              <p>Activities will appear here as users interact with the system.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/activity.js"></script>
</body>
</html>
