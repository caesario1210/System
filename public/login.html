<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - EstateOS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <h1>Estate<span>OS</span></h1>
      <p>Real Estate Management System</p>
    </div>

    <div id="loginError" class="alert alert-error" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block">Sign In</button>
    </form>

    <div class="login-demo">
      <p><strong>Demo Credentials</strong></p>
      <p>Admin: <code>admin</code> / <code>admin123</code></p>
      <p>Staff: <code>staff</code> / <code>staff123</code></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
